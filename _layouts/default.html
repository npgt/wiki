<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>{{ page.title }} | {{ site.title }}</title>
    <link rel="stylesheet" href="/assets/css/style.css">
    <!-- Font Awesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="/assets/js/script.js" defer></script>
</head>
<body>
    <header>
        <h1>{{ site.title }}</h1>
        <p>{{ site.description }}</p>
        <input type="text" id="searchInput" placeholder="Keresés az oldalak között..." onkeyup="searchPages()">
        <button id="themeToggle" onclick="toggleTheme()">
            <i class="fas fa-sun"></i> <!-- Alapértelmezett: nap ikon -->
        </button>
    </header>
    <div id="sidebar">
        <h3>Oldalak</h3>
        <ul id="pageList">
            {% for page in site.pages %}
                {% if page.path contains '.md' and page.path != 'index.md' %}
                    <li class="page-item" data-title="{{ page.title | downcase }}"><a href="{{ page.url }}">{{ page.title }}</a></li>
                {% endif %}
            {% endfor %}
        </ul>
    </div>
    <div id="content">
        {{ content }}
    </div>
    <footer>
        <p>© {{ "now" | date: "%Y" }} - {{ site.title }}</p>
    </footer>
</body>
</html>
