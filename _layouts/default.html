<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>{{ page.title }} | {{ site.title }}</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            display: flex;
            gap: 20px;
        }
        #sidebar {
            width: 200px;
            position: fixed;
            top: 20px;
            left: 20px;
        }
        #sidebar ul {
            list-style: none;
            padding: 0;
        }
        #sidebar a {
            color: blue;
            text-decoration: none;
        }
        #sidebar a:hover {
            text-decoration: underline;
        }
        #content {
            margin-left: 240px;
            max-width: 800px;
        }
    </style>
</head>
<body>
    <div id="sidebar">
        <h3>Oldalak</h3>
        <ul>
            {% for page in site.pages %}
                {% if page.path contains '.md' and page.path != 'index.md' %}
                    <li><a href="{{ page.url }}">{{ page.title }}</a></li>
                {% endif %}
            {% endfor %}
        </ul>
    </div>
    <div id="content">
        {{ content }}
    </div>
</body>
</html>
