<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>{{ page.title }} | {{ site.title }}</title>
    <link rel="stylesheet" href="{{ site.baseurl }}/assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap">
    <script src="{{ site.baseurl }}/assets/js/script.js" defer></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>{{ site.title }}</h1>
            <p>{{ site.description }}</p>
            <input type="text" id="searchInput" placeholder="Keresés az oldalak között..." onkeyup="searchPages()">
            <button id="themeToggle" onclick="toggleTheme()">
                <i class="fas fa-sun"></i>
            </button>
        </header>
        <aside id="sidebar">
            <h3>Oldalak</h3>
            <ul id="pageList">
                {% for page in site.pages %}
                    {% if page.path contains '.md' and page.path != 'index.md' %}
                        <li class="page-item" data-title="{{ page.title | downcase }}"><a href="{{ site.baseurl }}{{ page.url }}">{{ page.title }}</a></li>
                    {% endif %}
                {% endfor %}
            </ul>
        </aside>
        <main id="content">
            {{ content }}
        </main>
        <footer>
            <p>© {{ "now" | date: "%Y" }} - {{ site.title }}</p>
        </footer>
    </div>
</body>
</html>
